<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeoStock - Hệ Thống Quản Lý Kho</title>
    <script>
      // Fix for "Cannot set property fetch" error in some iframe environments
      (function() {
        try {
          var originalFetch = window.fetch;
          if (originalFetch) {
            // Try to redefine fetch with a no-op setter to prevent "only a getter" errors
            Object.defineProperty(window, 'fetch', {
              get: function() { return originalFetch; },
              set: function() { /* Ignore attempts to overwrite fetch */ },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.warn("NeoStock: Could not adjust window.fetch descriptor", e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
